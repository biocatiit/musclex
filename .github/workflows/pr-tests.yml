name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: pr-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unittest:
    name: Python unittest
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    env:
      MPLBACKEND: Agg
      PYTHONUNBUFFERED: "1"
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pr-tests-${{ hashFiles('setup.py', 'requirements') }}
          restore-keys: |
            ${{ runner.os }}-pip-pr-tests-
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libdbus-1-3 \
            libegl1 \
            libgl1 \
            libgomp1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .

      - name: Build Cython fitting extension
        working-directory: musclex/tests/fitting_ab/model_variants/model_cython
        run: |
          python setup.py build_ext --inplace

      - name: Run smoke tests
        run: |
          xvfb-run -a python -m unittest musclex.tests.fitting_ab.tests.test_smoke -v

      - name: Run MuscleX global summary tests
        run: |
          xvfb-run -a python -m unittest \
            musclex.tests.musclex_tester.MuscleXGlobalTester.testHeadlessMarEquator \
            musclex.tests.musclex_tester.MuscleXGlobalTester.testHeadlessEigerEquator \
            musclex.tests.musclex_tester.MuscleXGlobalTester.testHeadlessPilatusEquator \
            musclex.tests.musclex_tester.MuscleXGlobalTester.testHeadlessMarQuadrantFolder \
            musclex.tests.musclex_tester.MuscleXGlobalTester.testHeadlessEigerQuadrantFolder \
            musclex.tests.musclex_tester.MuscleXGlobalTester.testHeadlessPilatusQuadrantFolder \
            musclex.tests.musclex_tester.MuscleXGlobalTester.testHeadlessMarDiffraction \
            musclex.tests.musclex_tester.MuscleXGlobalTester.testHeadlessEigerDiffraction \
            musclex.tests.musclex_tester.MuscleXGlobalTester.testHeadlessPilatusDiffraction \
            musclex.tests.musclex_tester.MuscleXGlobalTester.testHeadlessMarPTConvexHullVertical \
            musclex.tests.musclex_tester.MuscleXGlobalTester.testHeadlessEigerPTConvexHullVertical \
            musclex.tests.musclex_tester.MuscleXGlobalTester.testHeadlessPTFittingGaussiansHorizontal \
            musclex.tests.musclex_tester.MuscleXGlobalTester.testHeadlessAISE \
            -v
